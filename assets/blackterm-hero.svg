<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">BLACKTERM — Autonomous Cyber Investigation Platform</title>
  <desc id="desc">Dark futuristic cybersecurity banner with a glowing BLACKTERM wordmark, network nodes, grid lines, and investigation workflow labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#070b12"/><stop offset="50%" stop-color="#0b111c"/><stop offset="100%" stop-color="#05070c"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff3b63"/><stop offset="45%" stop-color="#ff5f7e"/><stop offset="100%" stop-color="#9d4edd"/></linearGradient>
    <linearGradient id="mutedLine" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff4d6d" stop-opacity="0"/><stop offset="50%" stop-color="#ff4d6d" stop-opacity=".7"/><stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/></linearGradient>
    <radialGradient id="orb"><stop offset="0%" stop-color="#ff4d6d" stop-opacity=".9"/><stop offset="45%" stop-color="#ff4d6d" stop-opacity=".28"/><stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#94a3b8" stroke-opacity=".07" stroke-width="1"/></pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#ffffff" opacity=".018"/></pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="18"/></filter>
    <clipPath id="panelClip"><rect x="38" y="38" width="1524" height="424" rx="24"/></clipPath>
  </defs>
  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect x="38" y="38" width="1524" height="424" rx="24" fill="#0a0f18" stroke="#263244" stroke-width="2"/>
  <rect x="38" y="38" width="1524" height="424" rx="24" fill="url(#grid)"/>
  <rect x="38" y="38" width="1524" height="424" rx="24" fill="url(#scanlines)"/>
  <g clip-path="url(#panelClip)">
    <circle cx="195" cy="118" r="155" fill="url(#orb)" opacity=".18"/>
    <circle cx="1435" cy="390" r="190" fill="url(#orb)" opacity=".12"/>
    <path d="M0 384 C220 280, 380 430, 610 320 S1010 205, 1600 310" fill="none" stroke="url(#mutedLine)" stroke-width="2" opacity=".35"/>
    <g opacity=".45" stroke="#ff4d6d" stroke-width="1.2">
      <line x1="118" y1="130" x2="268" y2="186"/><line x1="268" y1="186" x2="188" y2="292"/><line x1="188" y1="292" x2="330" y2="350"/><line x1="330" y1="350" x2="440" y2="282"/>
      <line x1="1268" y1="135" x2="1412" y2="190"/><line x1="1412" y1="190" x2="1328" y2="294"/><line x1="1328" y1="294" x2="1476" y2="350"/><line x1="1476" y1="350" x2="1545" y2="278"/>
    </g>
    <g fill="#ff4d6d" filter="url(#glow)">
      <circle cx="118" cy="130" r="4"/><circle cx="268" cy="186" r="4"/><circle cx="188" cy="292" r="4"/><circle cx="330" cy="350" r="4"/><circle cx="440" cy="282" r="4"/>
      <circle cx="1268" cy="135" r="4"/><circle cx="1412" cy="190" r="4"/><circle cx="1328" cy="294" r="4"/><circle cx="1476" cy="350" r="4"/><circle cx="1545" cy="278" r="4"/>
    </g>
  </g>
  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="800" y="186" text-anchor="middle" font-size="76" font-weight="800" letter-spacing="11" fill="#ff4d6d" opacity=".28" filter="url(#softGlow)">BLACKTERM</text>
    <text x="800" y="186" text-anchor="middle" font-size="76" font-weight="800" letter-spacing="11" fill="#f8fafc">BLACK<tspan fill="url(#accent)">TERM</tspan></text>
    <rect x="522" y="214" width="556" height="2" rx="1" fill="url(#mutedLine)"/>
    <text x="800" y="260" text-anchor="middle" font-size="25" font-weight="650" letter-spacing="2.1" fill="#d9e2ef">AUTONOMOUS CYBER INVESTIGATION PLATFORM</text>
    <text x="800" y="306" text-anchor="middle" font-size="15" letter-spacing="3" fill="#8996a8">RECONNAISSANCE  •  OSINT  •  THREAT INTELLIGENCE  •  AI INVESTIGATION</text>
    <g transform="translate(387 355)">
      <rect width="826" height="54" rx="27" fill="#0e1623" stroke="#2b3a4e"/>
      <circle cx="33" cy="27" r="7" fill="#ff4d6d" filter="url(#glow)"/>
      <text x="58" y="33" font-size="15" font-weight="700" letter-spacing="1.5" fill="#f1f5f9">MISSION CONTROL</text><path d="M215 27H270" stroke="#3d4b60" stroke-width="2"/>
      <text x="292" y="33" font-size="15" font-weight="700" letter-spacing="1.5" fill="#f1f5f9">CORRELATE</text><path d="M416 27H471" stroke="#3d4b60" stroke-width="2"/>
      <text x="493" y="33" font-size="15" font-weight="700" letter-spacing="1.5" fill="#f1f5f9">INVESTIGATE</text><path d="M646 27H701" stroke="#3d4b60" stroke-width="2"/>
      <text x="723" y="33" font-size="15" font-weight="700" letter-spacing="1.5" fill="#f1f5f9">REPORT</text>
    </g>
    <text x="74" y="79" font-size="12" letter-spacing="2" fill="#66758a">BLACKTERM // PLATFORM</text>
    <text x="1526" y="79" text-anchor="end" font-size="12" letter-spacing="2" fill="#66758a">AUTHORIZED USE ONLY</text>
    <text x="800" y="446" text-anchor="middle" font-size="13" font-style="italic" letter-spacing="1.4" fill="#7c899b">One investigation. One platform.</text>
  </g>
  <path d="M38 62V38H62M1538 38H1562V62M38 438V462H62M1538 462H1562V438" fill="none" stroke="#ff4d6d" stroke-width="2" opacity=".85"/>
</svg>
