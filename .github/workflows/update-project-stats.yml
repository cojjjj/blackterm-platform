name: Update project stats

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stats:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh BLACKTERM telemetry
        run: python tools/update_stats.py

      - name: Commit refreshed statistics
        run: |
          if git diff --quiet; then
            echo "Statistics are already current."
            exit 0
          fi
          git config user.name "blackterm-stats[bot]"
          git config user.email "blackterm-stats[bot]@users.noreply.github.com"
          git add README.md assets/project-stats.json assets/project-stats.svg
          git commit -m "chore: refresh project telemetry [skip ci]"
          git push
