name: Windows Build
on:
  workflow_dispatch:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -e . pyinstaller
      - run: pyinstaller --noconfirm --windowed --name "BLACKTERM-RECON" --collect-all PySide6 blackterm_recon/desktop/app.py
      - uses: actions/upload-artifact@v4
        with:
          name: BLACKTERM-RECON-Windows
          path: dist/BLACKTERM-RECON/**
